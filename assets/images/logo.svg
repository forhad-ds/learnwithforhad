<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="36" height="36">
  <!-- Outer hexagon border -->
  <polygon points="50,2 93,27 93,73 50,98 7,73 7,27"
    fill="none" stroke="#1a2744" stroke-width="6" stroke-linejoin="round"/>
  <!-- Inner hexagon fill -->
  <polygon points="50,14 84,33 84,67 50,86 16,67 16,33"
    fill="#1a2744"/>
  <!-- Bar chart: three bars with upward trend -->
  <rect x="28" y="58" width="7" height="14" rx="1" fill="#fff"/>
  <rect x="38" y="48" width="7" height="24" rx="1" fill="#fff"/>
  <rect x="48" y="38" width="7" height="34" rx="1" fill="#fff"/>
  <!-- Upward arrows -->
  <path d="M31.5 53 L31.5 46 L28 49.5" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M31.5 46 L35 49.5" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M51.5 33 L51.5 25 L48 28.5" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M51.5 25 L55 28.5" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Circuit / data node lines -->
  <line x1="60" y1="50" x2="72" y2="50" stroke="#fff" stroke-width="1.5" opacity="0.8"/>
  <line x1="60" y1="58" x2="72" y2="58" stroke="#fff" stroke-width="1.5" opacity="0.8"/>
  <line x1="60" y1="42" x2="68" y2="42" stroke="#fff" stroke-width="1.5" opacity="0.8"/>
  <!-- Data nodes -->
  <circle cx="72" cy="50" r="2.5" fill="#fff"/>
  <circle cx="72" cy="58" r="2.5" fill="#fff"/>
  <circle cx="68" cy="42" r="2.5" fill="#fff"/>
  <!-- Small processing block -->
  <rect x="60" y="36" width="10" height="8" rx="1.5" fill="none" stroke="#fff" stroke-width="1.3" opacity="0.7"/>
  <line x1="63" y1="39" x2="67" y2="39" stroke="#fff" stroke-width="1" opacity="0.7"/>
  <line x1="63" y1="41.5" x2="66" y2="41.5" stroke="#fff" stroke-width="1" opacity="0.7"/>
</svg>
